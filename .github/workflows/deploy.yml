name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug Directory Structure
        run: ls -R

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Conectar a EC2 y desplegar
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_KEY }}
          script: |
            echo "Stopping and removing existing container if it exists..."
            sudo docker stop fullstack-app || true
            sudo docker rm fullstack-app || true

            echo "Creating Docker network if not exists..."
            sudo docker network create fullstack-net || true

            echo "Pulling latest Docker image..."
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/fullstack-app

            echo "Running new container..."
            sudo docker run --platform linux/arm64 -d -p 5000:5000 -p 3000:3000 --name fullstack-app \
              --network fullstack-net \
              --env DB_HOST=db \
              --env DB_USER=postgres \
              --env DB_PASS=postgres \
              --env DB_NAME=mydatabase \
              --env DB_PORT=5432 \
              ${{ secrets.DOCKER_USERNAME }}/fullstack-app

            echo "Waiting for database to be ready..."
            sleep 10

            echo "Initializing database..."
            sudo docker exec -i fullstack-app psql -U postgres -d mydatabase -f /app/backend/init.sql || echo "Database initialization failed!"

            echo "Deployment completed successfully!"