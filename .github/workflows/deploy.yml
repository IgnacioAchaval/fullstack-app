name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ✅ Ensures all files are pulled, including subdirectories

      - name: Debug Directory Structure
        run: ls -R  # ✅ Lists all files and folders in the workspace

      - name: Set Up QEMU (for Multi-Arch Builds)
        uses: docker/setup-qemu-action@v2

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Multi-Arch Docker Image
        run: |
          docker buildx build --platform linux/arm64,linux/amd64 \
            -t ${{ secrets.DOCKER_USERNAME }}/fullstack-app \
            --push -f backend/Dockerfile .

      - name: Connect to EC2 and Deploy
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_KEY }}
          script: |
            echo "Stopping and removing existing container if it exists..."
            sudo docker stop fullstack-app || true
            sudo docker rm fullstack-app || true

            echo "Pulling latest Docker image..."
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/fullstack-app

            echo "Running new container..."
            sudo docker run -d -p 5000:5000 -p 3000:3000 --name fullstack-app \
              --network fullstack-net \
              --env DB_HOST=db \
              --env DB_USER=postgres \
              --env DB_PASS=postgres \
              --env DB_NAME=mydatabase \
              --env DB_PORT=5432 \
              ${{ secrets.DOCKER_USERNAME }}/fullstack-app

            echo "Initializing database..."
            sudo docker exec -i db psql -U postgres -d mydatabase < backend/init.sql || echo "Database init failed"
            echo "Deployment completed successfully!"