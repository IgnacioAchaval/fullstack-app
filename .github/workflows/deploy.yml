name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v2

      - name: Configurar Docker
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Construir y subir imagen Docker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fullstack-app .
          docker push ${{ secrets.DOCKER_USERNAME }}/fullstack-app

      - name: Conectar a EC2 y desplegar
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_KEY }}
          script: |
            sudo docker stop fullstack-app || true
            sudo docker rm fullstack-app || true
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/fullstack-app
            sudo docker run -d -p 5000:5000 -p 3000:3000 --name fullstack-app ${{ secrets.DOCKER_USERNAME }}/fullstack-app
